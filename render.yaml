services:
  - type: web
    name: todo-app
    env: docker
    plan: starter
    numInstances: 1
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: todo-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ENVIRONMENT
        value: production
    databases:
      - name: todo-db
        databaseName: todos_db
        user: postgres
